<div>
    <h1>System Backup</h1>
    <div class="card">
        <p>Click the button below to create a backup of the system database. The database will be stored securely in the
            local `backup` directory with a timestamp.</p>

        <button (click)="onBackup()" [disabled]="isLoading" style="margin-top: 16px;">
            {{ isLoading ? 'Backing up...' : 'Backup Database' }}
        </button>

        <div *ngIf="message" style="margin-top: 16px; color: var(--success); font-weight: 500;">
            {{ message }}
        </div>

        <div *ngIf="error" style="margin-top: 16px; color: var(--danger); font-weight: 500;">
            {{ error }}
        </div>
    </div>
</div>
