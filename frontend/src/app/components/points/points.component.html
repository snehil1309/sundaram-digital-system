<div>
    <h1>Points Management</h1>

    <div class="card">
        <h3>Redeem Points</h3>
        <form (ngSubmit)="onRedeem()">
            <div class="grid grid-2">
                <select [(ngModel)]="redeemData.customer_id" name="customer_id" required>
                    <option value="" disabled>Select Customer</option>
                    <option *ngFor="let c of customers" [value]="c.id">{{ c.name }} (Bal: {{ c.total_points }} pts)
                    </option>
                </select>
                <input type="number" [(ngModel)]="redeemData.points_to_redeem" name="points_to_redeem"
                    placeholder="Points to Redeem" required>
            </div>
            <button type="submit">Redeem</button>
        </form>
        <div style="color: red; margin-top: 10px;" *ngIf="error">{{ error }}</div>
        <div style="color: green; margin-top: 10px;" *ngIf="message">{{ message }}</div>
    </div>

    <div class="card">
        <h3>Points History</h3>
        <div style="margin-bottom: 16px;">
            <select [(ngModel)]="historyCustomerId" (change)="loadHistory()" style="max-width: 300px;">
                <option value="" disabled>Select Customer to View History</option>
                <option *ngFor="let c of customers" [value]="c.id">{{ c.name }} ({{ c.phone }})</option>
            </select>
        </div>

        <table *ngIf="history.length > 0">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Order ID</th>
                    <th>Added</th>
                    <th>Redeemed</th>
                    <th>Balance</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let h of history">
                    <td>{{ h.date | date:'short' }}</td>
                    <td>{{ h.order_id || '-' }}</td>
                    <td style="color: var(--success);">+{{ h.points_added }}</td>
                    <td style="color: var(--danger);">-{{ h.points_redeemed }}</td>
                    <td><b>{{ h.balance_points }}</b></td>
                </tr>
            </tbody>
        </table>
        <p *ngIf="historyCustomerId && history.length === 0">No history found for this customer.</p>
    </div>
</div>
